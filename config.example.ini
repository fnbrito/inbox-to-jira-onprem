# Copy this file to config.ini and fill in the values:
#   cp config.example.ini config.ini
#   chmod 600 config.ini
#
# IMPORTANT: put comments on their OWN line (like these). Do NOT append a comment
# after a value on the same line - the value is read literally, so a trailing
# "# ..." or "; ..." would become part of the value.
#
# Secrets may be left blank here and supplied via environment variables instead
# (recommended for production): GRAPH_CLIENT_SECRET and JIRA_PASSWORD.

[graph]
# From the Microsoft Entra (Azure AD) app registration - see README, Step 1.
tenant_id = 00000000-0000-0000-0000-000000000000
client_id = 00000000-0000-0000-0000-000000000000
# Leave blank and use env GRAPH_CLIENT_SECRET in production.
client_secret =
mailbox = email@example.com

[jira]
base_url = https://jira.example.com
user = svc-emailtojira
# Leave blank and use env JIRA_PASSWORD in production.
password =
# The sandbox project key.
project_key = ES
issue_type = Support Request
# Reporter is frequently a REQUIRED create field. Set it to a valid Jira username
# (Jira Server matches users by username, not email). Leave blank only if Reporter
# is not required. For the sandbox test you can use your own username; switch to
# the service account before go-live.
default_reporter = svc-emailtojira
# Any OTHER required create fields, as a single JSON object merged verbatim into
# the new issue. Run `--preflight` to see which fields are required.
# List ids with `--list-accounts`. Example:
#   extra_fields = {"customfield": "3"}
# Leave blank only if the project's field config makes these fields optional.
# (Must be one line of valid JSON.)
extra_fields =
# Extra labels added to every created issue (comma-separated), e.g. for board
# filters/reporting. The bridge also adds a functional thread-key label
# (eml-<hash>) used to thread replies onto the same issue - leave that one alone.
extra_labels = email-intake
# verify_ssl: true | false | /path/to/ca-bundle.pem
# Use the CA bundle path if Jira uses an internal/self-signed certificate.
# Avoid 'false' outside throwaway testing - it disables TLS verification.
verify_ssl = true

[behavior]
# Mark messages read after processing. Used only when processed_folder is blank;
# with processed_folder set, messages are MOVED instead (see below).
mark_read = true
upload_attachments = true
max_attachment_mb = 10
# Drop out-of-office / bounces / no-reply senders to avoid mail loops.
skip_auto_replies = true
# Max messages per pass.
fetch_limit = 25
# Thread-dedup label prefix, e.g. eml-1a2b3c4d... is stamped on each issue.
label_prefix = eml
# Set Reporter to the email sender when they have a Jira account; else fall
# back to default_reporter. (Sender must be a Jira user; the acting account
# needs the "Modify Reporter" permission.)
reporter_from_sender = true
# Add Cc/To people who are Jira users as Watchers (notified + can view).
# Addresses with no Jira account are recorded in the description instead.
add_cc_watchers = true
# Inline images >= this size are kept and embedded in the description (e.g.
# pasted screenshots); smaller inline images (signature logos) are dropped.
inline_image_min_kb = 20
# Include the From/To/Cc/Received metadata block above the body (before the
# ---- divider) in the description. Set false to show just the email body.
include_email_header = false
# Track processed mail by MOVING it into this folder (created if missing) instead
# of relying on read/unread - processing no longer depends on a message being
# opened. Leave blank to fall back to mark_read.
processed_folder = Filed to Jira
# When a reply becomes a comment, @-mention the sender if they are a Jira user
# (comment is still posted by the service account; no impersonation).
mention_sender_in_comments = true

# Optional: add labels based on who sent the email. Each key is one of:
#   user@domain    exact sender address
#   @domain        any sender in that domain
#   !user@domain   any sender EXCEPT that address
#   !@domain       any sender NOT in that domain (e.g. tag external senders)
# The value is a comma-separated list of labels.
[label_rules]
orders@example.com = sales-orders
@vendor.com = vendor, external
!@example.com = external
